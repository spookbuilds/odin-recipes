    <h2>Ingredients</h2>
    <ul>
        <li>Eggs</li>
        <li>Flour</li>
        <li>Sugar</li>
        <li>Milk</li>
    </ul>

    <h2>Steps</h2>
    <ol>
        <li>Break eggs and mix</li>
        <li>Mix in the flour</li>
        <li>Mix in the milk</li>
        <li>Heat pan</li>
        <li>Add batter to pan, flip when bubbles start to pop on the surface</li>

    </ol>
